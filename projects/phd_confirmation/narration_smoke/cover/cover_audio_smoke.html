<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cover Audio Smoke Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      background: #030712;
      color: #f8fafc;
      font: 14px system-ui, sans-serif;
    }

    video {
      width: 100vw;
      height: calc(100vh - 74px);
      object-fit: contain;
      background: #030712;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-top: 1px solid rgba(248, 250, 252, 0.16);
      background: #0f172a;
    }

    button {
      padding: 8px 12px;
      border: 1px solid rgba(248, 250, 252, 0.22);
      border-radius: 6px;
      background: #1e293b;
      color: #f8fafc;
      cursor: pointer;
    }

    audio {
      flex: 1;
      min-width: 220px;
    }
  </style>
</head>
<body>
  <video id="coverVideo" preload="metadata" playsinline muted loop>
    <source src="../../media/videos/scenario_cover_eye_attractor/1080p60/VWAExtensionsCover.mp4" type="video/mp4" />
  </video>
  <div class="controls">
    <button id="playBoth" type="button">Play</button>
    <button id="restart" type="button">Restart</button>
    <audio id="coverAudio" controls preload="metadata">
      <source src="cover_kokoro.wav" type="audio/wav" />
    </audio>
    <span>Cover page smoke test</span>
  </div>
  <script>
    const video = document.getElementById("coverVideo");
    const audio = document.getElementById("coverAudio");
    const playBoth = document.getElementById("playBoth");
    const restart = document.getElementById("restart");

    async function playOrPause() {
      if (audio.paused) {
        await video.play().catch(() => {});
        await audio.play().catch(() => {});
      } else {
        video.pause();
        audio.pause();
      }
      playBoth.textContent = audio.paused ? "Play" : "Pause";
    }

    function restartBoth() {
      video.currentTime = 0;
      audio.currentTime = 0;
      video.play().catch(() => {});
      audio.play().catch(() => {});
      playBoth.textContent = "Pause";
    }

    playBoth.addEventListener("click", playOrPause);
    restart.addEventListener("click", restartBoth);
    audio.addEventListener("pause", () => { playBoth.textContent = "Play"; });
    audio.addEventListener("play", () => { playBoth.textContent = "Pause"; });
  </script>
</body>
</html>
